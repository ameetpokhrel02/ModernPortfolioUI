# render.yaml
services:
  # Backend web service
  - type: web
    name: portfolio-backend
    runtime: docker
    repo: https://github.com/ameetpokhrel02/ModernPortfolioUI  # optional, Render will auto-detect
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true  # Render will generate a random secret
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: portfolio-redis
          property: connectionString
      - key: VITE_API_BASE_URL  # if your frontend needs it, but it's not used by backend
        value: https://portfolio-backend.onrender.com/api
    autoDeploy: true  # automatically redeploy on every push

# Managed PostgreSQL database
databases:
  - name: portfolio-db
    plan: free  # or standard, depending on your needs

# Managed Redis instance
redis:
  - name: portfolio-redis
    plan: free