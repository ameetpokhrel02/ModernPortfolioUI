services:
  # Backend web service
  - type: web
    name: portfolio-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile        # absolute path from repo root
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: REDIS_URL
        fromService:
          type: redis
          name: portfolio-redis
          property: connectionString
    autoDeploy: true
    disk:
      name: sqlite-data
      mountPath: /app/data
      sizeGB: 1

  # Redis instance
  - type: redis
    name: portfolio-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all connections (backend will use this internally)