services:
  # Backend web service
  - type: web
    name: portfolio-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: portfolio-redis
          property: connectionString
    autoDeploy: true

  # PostgreSQL database
  - type: postgres
    name: portfolio-db
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all connections (internal backend will use this)

  # Redis instance
  - type: redis
    name: portfolio-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all connections (internal backend will use this)