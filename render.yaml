services:
  # Backend web service
  - type: web
    name: portfolio-backend
    runtime: docker
    repo: https://github.com/ameetpokhrel02/ModernPortfolioUI   # optional
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db                # matches the PostgreSQL service below
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: portfolio-redis             # matches the Redis service below
          property: connectionString
      - key: VITE_API_BASE_URL
        value: https://portfolio-backend.onrender.com/api   # for frontend, not used by backend
    autoDeploy: true

  # PostgreSQL database
  - type: postgresql
    name: portfolio-db
    plan: free

  # Redis instance
  - type: redis
    name: portfolio-redis
    plan: free