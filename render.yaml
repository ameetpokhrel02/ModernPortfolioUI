services:
  # Backend web service
  - type: web
    name: portfolio-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: REDIS_URL
        fromService:
          type: redis
          name: portfolio-redis
          property: connectionString
      # No DATABASE_URL – settings.py will fall back to SQLite
    autoDeploy: true
    disk:
      name: sqlite-data
      mountPath: /app/data        # matches your SQLite directory
      sizeGB: 1

  # Redis instance (still needed for Django Channels)
  - type: redis
    name: portfolio-redis
    plan: free